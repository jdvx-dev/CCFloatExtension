<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCFloat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #ffffff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    h1 .logo { color: #ff4444; }

    .status {
      font-size: 11px;
      color: #666;
      margin-bottom: 14px;
      min-height: 14px;
    }

    .status.active { color: #4caf50; }

    button {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #toggleBtn {
      background: #e53935;
      color: #fff;
    }

    #toggleBtn:hover        { background: #c62828; }
    #toggleBtn.open         { background: #388e3c; }
    #toggleBtn.open:hover   { background: #2e7d32; }
    #toggleBtn:disabled     { opacity: 0.5; cursor: default; }

    .hint {
      margin-top: 10px;
      font-size: 10px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1><span class="logo">CC</span>Float</h1>
  <p class="status" id="statusText">Checking...</p>
  <button id="toggleBtn">Open Float Window</button>
  <p class="hint">Open a YouTube video, enable captions (CC), then click above.</p>
  <script src="../utils/messages.js"></script>
  <script src="popup.js"></script>
</body>
</html>
