<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCFloat</title>
  <link rel="stylesheet" href="float.css" />
</head>
<body>
  <div id="toolbar">
    <span id="appLabel">CC</span>
    <div id="controls">
      <button class="ctrl-btn" id="fontDecBtn" title="Decrease font size">A−</button>
      <button class="ctrl-btn" id="fontIncBtn" title="Increase font size">A+</button>
      <button class="ctrl-btn" id="closeBtn" title="Close">✕</button>
    </div>
  </div>

  <div id="captionArea">
    <p id="captionText">Waiting for captions...</p>
  </div>

  <script src="../utils/messages.js"></script>
  <script src="float.js"></script>
</body>
</html>
